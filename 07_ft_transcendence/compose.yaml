services:
  # ==========================================
  # Backend Service (Django + FastAPI)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ft_transcendence_backend
    user: root
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE}
      - DB_NAME=${DB_NAME}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      # Vault (dev mode). When USE_VAULT is on, settings.py pulls secrets from
      # secret/transcendence; otherwise it falls back to the env vars above.
      - USE_VAULT=${USE_VAULT:-true}
      - VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
    volumes:
      - ./backend:/app
      # Raylib/WASM poker game build (served by Django at /game/).
      # PROJECT_ROOT inside the container is "/", so juego maps to /juego.
      - ./juego:/juego:ro
      - vault_creds:/vault_creds:ro
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - transcendence-network
    depends_on:
      # Wait until vault-init has finished writing secrets to Vault so the first
      # settings load can read them (the loader still falls back gracefully).
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend Service (Angular + Nginx)
  # ==========================================
  frontend:
    build:
      context: ./front
      dockerfile: ../docker/Dockerfile.frontend
    container_name: ft_transcendence_frontend
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    environment:
      - NG_ENV=${NG_ENV:-production}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
    volumes:
      # Serve config mounted at runtime so the image build context (./front)
      # doesn't need to reach ../docker. Static prod build comes from the image.
      - ./docker/nginx-app.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - transcendence-network
    depends_on:
      - backend
    healthcheck:
      # 127.0.0.1, not localhost (→ ::1): the image's nginx binds IPv4 only.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Reverse Proxy (Nginx)
  # ==========================================
  # ==========================================
  # SSL bootstrap — generates a self-signed cert into the ssl_certs volume so
  # NO private key is ever committed to git. Idempotent: skips if a cert already
  # exists. nginx waits for this to finish before starting (depends_on below).
  # ==========================================
  ssl-init:
    image: alpine/openssl:latest
    container_name: ft_transcendence_ssl_init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /ssl/cert.pem ] || [ ! -f /ssl/key.pem ]; then
          openssl req -x509 -newkey rsa:4096 -nodes -days 365 \
            -keyout /ssl/key.pem -out /ssl/cert.pem \
            -subj "/C=ES/ST=Madrid/L=Madrid/O=42/CN=localhost" &&
          echo "[SSL-INIT] Self-signed certificate generated.";
        else
          echo "[SSL-INIT] Certificate already present, skipping.";
        fi
        chmod 644 /ssl/key.pem /ssl/cert.pem || true
    volumes:
      - ssl_certs:/ssl
    restart: "no"

  nginx:
    #image: nginx:alpine
    image: owasp/modsecurity-crs:nginx
    container_name: ft_transcendence_nginx
    ports:
    # nginx inside the image listens on 8080/8443 (non-root, "avoid privileged
    # ports"), so the host side maps to those, never to 80/443 — no sudo needed.
    # Override HTTPS_PORT/HTTP_PORT if 8443/8080 are already taken on the host.
      - "${HTTPS_PORT:-8443}:8443"
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      # The OWASP modsecurity creates its own conf file and it cannot be copied from the outside;
      #instead, we leave the default conf as it is and then we OVERRIDE with custom configuration, not the other way around, thats why I create the waf.conf file
      #- ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/waf.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      - ./docker/modsecurity-override.conf:/etc/nginx/templates/modsecurity.d/modsecurity-override.conf.template:ro
      # Certs come from the ssl_certs volume populated by ssl-init at runtime,
      # never from a git-tracked ./docker/ssl bind mount.
      - ssl_certs:/etc/nginx/ssl:ro
    environment:
      - MODSEC_AUDIT_ENGINE=On
    networks:
      - transcendence-network
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      ssl-init:
        condition: service_completed_successfully
    healthcheck:
      # Use 127.0.0.1 (not localhost → ::1, nginx binds IPv4 only) over HTTPS
      # directly: port 80 only 301-redirects, and the cert is self-signed.
      # I need to change this because it looks like this image does not have "wget", it appears like a good approach
      # is to use this one:
      test: ["CMD", "nginx", "-t"]
      #test: ["CMD", "wget", "--no-verbose", "--tries=1", "--no-check-certificate", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  vault:
    image: hashicorp/vault:1.15
    container_name: ft_transcendence_vault
    ports:
      # Override VAULT_PORT if 8200 is already taken on the host.
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
    # apparently it is acceptable to present it in dev mode
    command:
      - vault
      - server
      - -dev
      - -dev-root-token-id=root
      - -dev-listen-address=0.0.0.0:8200
    cap_add:
    #IPC_LOCK prevents secrets from being swapped to disk (RAM → swap),
      - IPC_LOCK
    networks:
      - transcendence-network
    volumes:
      - vault_data:/vault/file

  vault-init:
    image: hashicorp/vault:1.15
    container_name: ft_transcendence_vault_init
    depends_on:
      - vault
    networks:
      - transcendence-network
    volumes: 
      - ./scripts/vault-init.sh:/vault-init.sh:ro
      - vault_creds:/vault_creds
    entrypoint:
      - sh
      - /vault-init.sh
    restart: "no"

# ==========================================
# Networks
# ==========================================
networks:
  transcendence-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  backend_data:
    driver: local
  frontend_data:
    driver: local
  vault_data:
  vault_creds:
  # Holds the runtime-generated self-signed TLS cert (see ssl-init service).
  ssl_certs:
