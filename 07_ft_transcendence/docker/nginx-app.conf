server {
    listen 4200;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Default nginx limit is 1M; avatar uploads (1-2MB photos) were hitting 413
    # before even reaching Django.
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # GSI (Google Sign-In) cannot postMessage across COOP boundaries.
    # Hide any upstream COOP/COEP so the Google Sign-In flow works.
    # The game iframe's COOP is set by the backend, not by this server block.
    proxy_hide_header Cross-Origin-Opener-Policy;
    proxy_hide_header Cross-Origin-Embedder-Policy;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # REST API → Django backend. Without this, a POST to /api/* falls through to
    # the SPA fallback below (try_files → index.html) and nginx returns 405 on a
    # static file. ^~ wins over the regex asset-cache rule.
    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        # $http_host preserves the port from the client's Host header; $host
        # strips it, which made Django build absolute URLs (e.g. avatar URLs)
        # without the port, so the browser fell back to the default port.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # WebSockets (Channels/Daphne) → backend, with the Upgrade handshake.
    location ^~ /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }

    # User-uploaded media (avatars, etc). Missing before — /media/* requests
    # fell through to the Angular SPA fallback (or the wrong port entirely,
    # see the Host header fix above), which is why avatar images failed to load.
    location ^~ /media/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location ^~ /static/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Angular routing: serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WASM card game — proxy to Django backend so it is served SAME-ORIGIN as
    # the Angular app. Avoids cross-origin CORS/COEP on index.wasm/.data and
    # lets the backend's COOP/COEP/CORP headers pass through untouched.
    # ^~ stops the regex asset-cache rule below from capturing /game-embed/*.js|.wasm.
    location ^~ /game-embed/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        # Framing is governed by the backend's CSP frame-ancestors. Drop the
        # redundant X-Frame-Options (browser logs "ignoring x-frame-options"
        # otherwise). Declaring add_header here also detaches the server-level
        # headers for this location, so re-add nosniff explicitly. The backend's
        # COOP/COEP/CORP/CSP are upstream headers and pass through untouched.
        proxy_hide_header X-Frame-Options;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Raw game assets (cards, table, audio) referenced from HTML/CSS.
    location ^~ /game-assets/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}
