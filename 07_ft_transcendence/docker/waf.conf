# --- Rate limiting zones ---
# Keyed by client IP. ~10 req/s sustained; the per-location limit_req sets the
# burst. This file is included inside the image's http{} block, so http-level
# directives like limit_req_zone are valid here.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

server {
    listen 8080;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Base image default is 1M; avatar uploads need headroom.
    client_max_body_size 20M;

    # --- API ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        # Security headers (always = also applied to proxied 4xx/5xx).
        # HSTS: force HTTPS for a year (incl. subdomains).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # SAMEORIGIN: block third-party framing but still allow the game iframe,
        # which is embedded from the same origin.
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Stop browsers MIME-sniffing API responses.
        add_header X-Content-Type-Options "nosniff" always;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # --- WebSockets (Daphne/ASGI) ---
    # Live tournament brackets, matchmaking and game rooms connect here.
    # The Upgrade/Connection headers are required for the HTTP→WS handshake.
    location /ws/ {
        limit_req zone=ws_limit burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }

    # --- Admin ---
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Game (WASM iframe served by the backend at /game-embed/) ---
    location /game-embed/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /game-assets/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # --- Static ---
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_cache_valid 200 10d;
    }

    location /media/ {
        proxy_pass http://backend:8000/media/;
        proxy_cache_valid 200 10d;
    }

    # --- Frontend fallback ---
    location / {
        # Clear COOP/COEP from the OWASP CRS image defaults — the GSI button
        # (Google Sign-In) cannot postMessage across COOP boundaries.
        more_clear_headers "Cross-Origin-Opener-Policy";
        more_clear_headers "Cross-Origin-Embedder-Policy";

        proxy_pass http://frontend:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_cache_bypass $http_upgrade;
    }
}