# --- STRICT WAF SETTINGS ---

SecAction \
"id:900000,\
phase:1,\
pass,\
nolog,\
t:none,\
setvar:tx.paranoia_level=2,\
setvar:tx.blocking_paranoia_level=2"

SecAction \
"id:900110,\
phase:1,\
pass,\
nolog,\
t:none,\
setvar:tx.inbound_anomaly_score_threshold=3,\
setvar:tx.outbound_anomaly_score_threshold=3"


# --- CUSTOM HARDENING RULES ---

# Block open redirect
SecRule ARGS:redirect "@rx ^https?://" \
"id:1000001,phase:2,deny,status:403,msg:'Open redirect blocked'"

# Block scanners
SecRule REQUEST_HEADERS:User-Agent "@rx (sqlmap|nikto)" \
"id:1000002,phase:1,deny,status:403,msg:'Scanner detected'"

# Allow the REST verbs the API needs through the CRS method-enforcement rule
# (911100). Without this, the CRS default set (GET HEAD POST OPTIONS) makes
# PUT/PATCH/DELETE trip the anomaly score and return 403 before our own rule
# below ever applies. This runs in phase 1 ahead of the CRS rules, and 911100
# only sets its default when tx.allowed_methods is unset, so this value wins.
SecAction \
"id:1000004,\
phase:1,\
pass,\
nolog,\
t:none,\
setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# Restrict methods — allow the standard REST verbs the API needs.
# PUT/PATCH update games & tournaments, DELETE removes keys/games/participants,
# OPTIONS is required for CORS preflight. Anything else (TRACE, CONNECT, ...) is denied.
SecRule REQUEST_METHOD "!^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$" \
"id:1000003,phase:1,deny,status:405,msg:'Method not allowed'"